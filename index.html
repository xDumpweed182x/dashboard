<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chronicle</title>
<style>
/* System font stack — works offline, renders identically on all Apple devices */
</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0b;--s1:#111114;--s2:#17171b;--s3:#1e1e24;--s4:#25252c;
  --b1:#1d1d23;--b2:#28282f;--b3:#35353e;
  --t1:#f0f0f2;--t2:#8a8a96;--t3:#52525e;--t4:#2e2e38;
  --dim:rgba(240,240,242,0.07);--dim2:rgba(240,240,242,0.04);
  --c-tv:#7eb8d4;--c-movie:#a98fd4;--c-trip:#7ec9a0;
  --c-event:#d4b87e;--c-release:#d49a7e;--c-plan:#d47e7e;--c-money:#a3c97e;
  --c-book:#c49a6c;--c-game:#8fb4e8;--c-music:#d4849e;--c-youtube:#e05e5e;--c-other:#8a8a96;
  --font:-apple-system,'SF Pro Display','SF Pro Text',system-ui,sans-serif;--mono:ui-monospace,'SF Mono',Menlo,monospace;--serif:'New York','Iowan Old Style',Georgia,serif;
  --tabh:72px;--safeb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:var(--font);background:var(--bg);color:var(--t1);
  font-size:14px;-webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
}
.phone{
  width:390px;height:844px;
  max-width:100vw;max-height:100dvh;
  background:var(--bg);position:relative;
  border-radius:44px;
  box-shadow:0 0 0 1px #1a1a20,0 32px 100px rgba(0,0,0,0.88),inset 0 0 0 1px #2a2a32;
}
@media(max-width:430px){
  body{display:block;background:var(--bg);}
  .phone{width:100%;height:100dvh;border-radius:0;box-shadow:none;}
}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100%;overflow:hidden;border-radius:44px;}
.statusbar{height:50px;display:flex;align-items:center;justify-content:space-between;padding:14px 22px 0;flex-shrink:0;}
.st-time{font-family:var(–mono);font-size:13px;font-weight:500;color:var(–t1);}
.st-icons{font-size:11px;color:var(–t1);display:flex;gap:5px;align-items:center;}

.screens{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateY(5px);transition:opacity .17s ease,transform .17s ease;overflow:hidden;}
.screen.on{opacity:1;pointer-events:all;transform:translateY(0);}

/* ── SCREEN HEADER ── */
.shead{padding:10px 20px 8px;display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0;}
.stitle{font-family:var(–serif);font-size:24px;line-height:1;font-weight:800;letter-spacing:-0.03em;text-transform:uppercase;}
.ssub{font-family:var(–mono);font-size:10px;color:var(–t3);margin-top:2px;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(–s2);border:1px solid var(–b2);color:var(–t2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;flex-shrink:0;}
.icon-btn:active{background:var(–s3);}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}

/* ── TAB BAR ── */
.tabbar{height:var(–tabh);padding-bottom:var(–safeb);background:var(–s1);border-top:1px solid var(–b1);display:flex;align-items:flex-start;padding-top:10px;flex-shrink:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:3px 0;border:none;background:none;}
.tabico{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:15px;transition:all .14s;}
.tab.on .tabico{background:var(–dim);}
.tablbl{font-family:var(–mono);font-size:10px;color:var(–t3);letter-spacing:.04em;transition:color .12s;}
.tab.on .tablbl{color:var(–t1);}

/* ── FAB ── */
.fab{position:absolute;right:18px;bottom:calc(var(–tabh) + 12px + var(–safeb));width:50px;height:50px;border-radius:50%;background:var(–t1);border:none;color:var(–bg);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,0.6);transition:transform .12s;z-index:10;}
.fab:active{transform:scale(.93);}

/* ══════════════
CALENDAR
══════════════ */
.cal-toggle{display:flex;gap:4px;padding:0 20px 8px;flex-shrink:0;}
.ct-btn{font-family:var(–mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:6px;border:1px solid var(–b1);background:transparent;color:var(–t3);cursor:pointer;transition:all .12s;}
.ct-btn.on{border-color:var(–b3);color:var(–t1);background:var(–dim);}

/* WEEK STRIP */
.wstrip{padding:0 14px 8px;flex-shrink:0;}
.wnav{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 8px;}
.wnav-lbl{font-family:var(–mono);font-size:11px;color:var(–t2);letter-spacing:.06em;}
.wnav-btns{display:flex;gap:2px;}
.wnb{background:none;border:none;color:var(–t3);cursor:pointer;width:28px;height:28px;border-radius:6px;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.wnb:active{background:var(–dim);}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.wday{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:10px;cursor:pointer;transition:all .12s;position:relative;}
.wday:active{background:var(–dim2);}
.wday.sel{background:var(–t1);}
.wd-dow{font-family:var(–mono);font-size:9px;letter-spacing:.08em;color:var(–t3);}
.wd-num{font-family:var(–mono);font-size:15px;font-weight:500;color:var(–t2);line-height:1;}
.wday.today .wd-num{color:var(–t1);}
.wday.sel .wd-dow,.wday.sel .wd-num{color:var(–bg);}
.wd-pip{width:4px;height:4px;border-radius:50%;background:var(–t3);}
.wday.sel .wd-pip{background:rgba(10,10,11,.4);}
.wday.today .wd-pip{background:var(–c-event);}

/* DAY HEAD */
.dayhead{padding:2px 20px 10px;flex-shrink:0;}
.dayhead-lbl{font-family:var(–serif);font-size:20px;color:var(–t1);}
.dayhead-sub{font-family:var(–mono);font-size:10px;color:var(–t3);margin-top:1px;}

/* AGENDA */
.agenda{padding:0 16px 110px;}
.a-empty{text-align:center;padding:48px 16px;}
.a-empty .ei{font-size:28px;opacity:.18;margin-bottom:10px;}
.a-empty p{font-family:var(–mono);font-size:11px;color:var(–t4);}

.aitem{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1px solid var(–b1);border-radius:12px;margin-bottom:7px;background:var(–s1);position:relative;overflow:hidden;transition:border-color .1s,opacity .2s;}
.aitem.checked{opacity:.45;}
.aitem.checked .ai-title{text-decoration:line-through;color:var(–t3);}
.aitem.overdue{border-color:rgba(212,126,126,.25);background:rgba(212,126,126,.04);}
.aitem.overdue::before{opacity:.6;}
.ep-check{width:22px;height:22px;border-radius:50%;border:2px solid var(–b2);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;position:relative;z-index:2;}
.ep-check.checked{background:var(–c-tv);border-color:var(–c-tv);}
.ep-check.checked::after{content:‘✓’;font-size:11px;color:#fff;font-weight:700;}
.ep-check.movie-chk{border-color:var(–c-movie);}
.ep-check.movie-chk.checked{background:var(–c-movie);border-color:var(–c-movie);}
.ep-check.event-chk{border-color:var(–b2);}
.ep-check.event-chk.checked{background:var(–t3);border-color:var(–t3);}
.aitem::before{content:’’;position:absolute;left:0;top:0;bottom:0;width:3px;}
.aitem.tv::before{background:var(–c-tv);}
.aitem.movie::before{background:var(–c-movie);}
.aitem.trip::before{background:var(–c-trip);}
.aitem.event::before{background:var(–c-event);}
.aitem.release::before{background:var(–c-release);}
.aitem.plan::before{background:var(–c-plan);}
.aitem.money::before{background:var(–c-money);}
.aitem.book::before{background:var(–c-book);}
.aitem.game::before{background:var(–c-game);}
.aitem.music::before{background:var(–c-music);}
.aitem.youtube::before{background:var(–c-youtube);}
.aitem.other::before{background:var(–c-other);}
.ai-body{flex:1;padding-left:3px;}
.ai-title{font-size:15px;font-weight:500;color:var(–t1);}
.ai-row{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.pill{font-family:var(–mono);font-size:9px;letter-spacing:.04em;padding:2px 7px;border-radius:20px;}
.pill.tv{color:var(–c-tv);background:rgba(126,184,212,.1);}
.pill.movie{color:var(–c-movie);background:rgba(169,143,212,.1);}
.pill.trip{color:var(–c-trip);background:rgba(126,201,160,.1);}
.pill.event{color:var(–c-event);background:rgba(212,184,126,.1);}
.pill.release{color:var(–c-release);background:rgba(212,154,126,.1);}
.pill.plan{color:var(–c-plan);background:rgba(212,126,126,.1);}
.pill.money{color:var(–c-money);background:rgba(163,201,126,.1);}
.pill.book{color:var(–c-book);background:rgba(196,154,108,.1);}
.pill.game{color:var(–c-game);background:rgba(143,180,232,.1);}
.pill.music{color:var(–c-music);background:rgba(212,132,158,.1);}
.pill.youtube{color:var(–c-youtube);background:rgba(224,94,94,.1);}
.pill.other{color:var(–c-other);background:rgba(138,138,150,.1);}
.ai-until{font-family:var(–mono);font-size:10px;color:var(–t3);}
.ai-note{font-size:12px;color:var(–t3);margin-top:3px;}
.ai-acts{display:flex;gap:0;align-items:center;}
.iab{background:none;border:none;cursor:pointer;color:var(–t4);font-size:14px;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.iab:active{background:var(–dim);color:var(–t2);}
.iab.d:active{color:var(–c-plan);}

/* MONTH GRID */
.mgrid-wrap{padding:0 14px 110px;}
.mg-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px;}
.mg-lbl{font-family:var(–serif);font-size:22px;}
.mg-dows{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.mg-dow{text-align:center;font-family:var(–mono);font-size:9px;color:var(–t4);padding:4px 0;letter-spacing:.05em;}
.mg-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mgcell{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;padding:5px 2px;cursor:pointer;transition:background .1s;}
.mgcell:active{background:var(–dim);}
.mgcell.today{background:var(–dim);}
.mgcell.sel{background:var(–t1)!important;}
.mgcell.om{opacity:.28;}
.mg-num{font-family:var(–mono);font-size:12px;color:var(–t2);line-height:1;}
.mgcell.today .mg-num{color:var(–t1);font-weight:600;}
.mgcell.sel .mg-num{color:var(–bg);font-weight:600;}
.mg-pips{display:flex;gap:2px;margin-top:3px;}
.mg-pip{width:4px;height:4px;border-radius:50%;}
.mgcell.sel .mg-pip{opacity:.4;}

/* ══════════════
TIMELINE
══════════════ */
.tlbody{padding:0 16px 110px;}
.tlm{margin-bottom:22px;}
.tl-yr{margin-bottom:4px;}
.tl-yr-lbl{font-family:var(–serif);font-weight:700;letter-spacing:-0.02em;font-size:22px;font-size:20px;color:var(–t1);padding:10px 14px 6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.tl-mo{margin:0 0 4px 0;}
.tl-mo-lbl{font-family:var(–serif);font-weight:500;letter-spacing:-0.01em;font-size:16px;color:var(–t2);padding:7px 14px 6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;border-top:1px solid var(–b1);}
.tl-day{margin:0 0 2px;}
.tl-day-lbl{font-family:var(–mono);font-size:9px;color:var(–t4);letter-spacing:.08em;text-transform:uppercase;padding:6px 14px 4px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.tl-day-lbl.today{color:var(–t2);}
.tl-chevron{font-size:12px;color:var(–t4);transition:transform .15s;}
.tl-day .aitem{margin:0 10px 5px;}
.tl-export-btn{font-family:var(–mono);font-size:10px;color:var(–c-trip);padding:4px 10px;border:1px solid rgba(126,201,160,.4);border-radius:6px;background:none;cursor:pointer;}
.tlm-lbl{font-family:var(–serif);font-size:18px;color:var(–t2);border-bottom:1px solid var(–b1);padding-bottom:7px;margin-bottom:9px;}
.tld{margin-bottom:8px;}
.tld-lbl{font-family:var(–mono);font-size:9px;color:var(–t4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;padding-left:2px;}
.tld-lbl.today{color:var(–t2);}

/* ══════════════
SERIES
══════════════ */
.srbody{padding:0 16px 110px;}
.ssblock{border:1px solid var(–b1);border-radius:14px;overflow:hidden;margin-bottom:9px;}
.sshd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(–s1);cursor:pointer;user-select:none;}
.sshd-l{display:flex;align-items:center;gap:8px;}
.sshd-title{font-family:var(–serif);font-weight:600;letter-spacing:-0.02em;font-size:17px;}
.ssbadge{font-family:var(–mono);font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(–b2);color:var(–t3);}
.sshint{font-family:var(–mono);font-size:9px;color:var(–t4);}
.sschev{font-size:11px;color:var(–t4);transition:transform .18s;}
.sschev.open{transform:rotate(90deg);}
.ssbd{display:none;border-top:1px solid var(–b1);padding:8px;}
.ssbd.open{display:block;}

/* ── TODAY’S WATCH ── */
.sr-today-block{margin-bottom:12px;border:1px solid var(–b2);border-radius:14px;overflow:hidden;background:var(–s1);}
.sr-today-hd{display:flex;justify-content:space-between;align-items:baseline;padding:11px 14px 8px;border-bottom:1px solid var(–b1);}
.sr-today-title{font-family:var(–serif);font-weight:700;letter-spacing:-0.02em;font-size:18px;font-size:18px;color:var(–t1);}
.sr-today-date{font-family:var(–mono);font-size:9px;color:var(–t4);letter-spacing:.04em;}
.srt-card{padding:11px 13px 9px;border-bottom:1px solid var(–b1);cursor:pointer;border-left:2px solid transparent;background:var(–bg);}
.srt-card:last-child{border-bottom:none;}
.srt-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:5px;}
.srt-name{font-family:var(–serif);font-size:14px;font-weight:500;color:var(–t1);letter-spacing:-0.02em;}
.srt-pill{font-family:var(–mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:4px;border:1px solid transparent;}
.srt-pill.airing{color:var(–c-trip);border-color:rgba(100,200,140,.3);background:rgba(100,200,140,.07);}
.srt-pill.behind{color:var(–c-plan);border-color:rgba(212,126,126,.3);background:rgba(212,126,126,.07);}
.srt-pill.active{color:var(–c-tv);border-color:rgba(100,140,220,.3);background:rgba(100,140,220,.07);}
.srt-mid{margin:4px 0 2px;}
.srt-ep{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;}
.srt-ep-title{font-family:var(–mono);font-size:12px;color:var(–t2);}
.srt-ep-hint{font-family:var(–mono);font-size:11px;color:var(–t4);font-style:italic;padding:3px 0;}
.srt-acts{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}

.srcard{display:flex;align-items:center;gap:9px;padding:10px 11px;border:1px solid var(–b1);border-radius:10px;margin-bottom:5px;background:var(–bg);position:relative;overflow:hidden;}
.srcard.behind{border-left:2px solid var(–c-plan);}
.srcard.airing{border-left:2px solid var(–c-trip);}
.src-main{flex:1;min-width:0;}
.src-name{font-size:14px;font-weight:500;color:var(–t1);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.src-tags{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.vtag{font-family:var(–mono);font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(–b2);color:var(–t2);}
.btag{font-family:var(–mono);font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(212,126,126,.1);color:var(–c-plan);border:1px solid rgba(212,126,126,.2);}
.stag{font-family:var(–mono);font-size:10px;color:var(–t3);}
.ntag{font-family:var(–mono);font-size:10px;color:var(–c-event);}
.ptag{font-family:var(–mono);font-size:10px;color:var(–c-movie);}
.src-acts{display:flex;gap:2px;align-items:center;}
.caughtbtn{font-family:var(–mono);font-size:10px;padding:5px 9px;border-radius:7px;background:rgba(126,201,160,.1);color:var(–c-trip);border:1px solid rgba(126,201,160,.2);cursor:pointer;white-space:nowrap;}
.addtlbtn{font-family:var(–mono);font-size:10px;color:var(–t3);padding:4px 8px;border:1px solid var(–b2);border-radius:6px;background:none;cursor:pointer;white-space:nowrap;}
.mv-sec{margin-bottom:2px;}
.mv-sec-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 12px;cursor:pointer;user-select:none;border-top:1px solid var(–b1);}
.mv-sec-title{font-family:var(–serif);font-weight:600;letter-spacing:-0.02em;font-size:20px;color:var(–t1);}
.mv-sec-count{font-family:var(–mono);font-size:10px;color:var(–t3);background:var(–s3);border-radius:10px;padding:2px 8px;}
.mv-yr-lbl{font-family:var(–serif);font-weight:500;letter-spacing:-0.01em;font-size:18px;color:var(–t2);padding:10px 16px 6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.mv-mo-lbl{font-family:var(–mono);font-size:11px;color:var(–t3);letter-spacing:.06em;text-transform:uppercase;padding:9px 16px 5px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.mv-empty{font-family:var(–mono);font-size:12px;color:var(–t4);padding:10px 14px 14px;font-style:italic;}
.me-type-lbl{display:flex;justify-content:space-between;align-items:center;padding:7px 16px 5px;cursor:pointer;user-select:none;font-family:var(–mono);font-size:11px;color:var(–t3);letter-spacing:.04em;background:var(–s1);}
.me-card{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(–b1);cursor:pointer;}
.me-card.me-done{opacity:.5;}
.me-card.me-done .me-title{text-decoration:line-through;}
.me-ico{font-size:18px;flex-shrink:0;margin-top:1px;width:24px;text-align:center;}
.me-body{flex:1;min-width:0;}
.me-title{font-size:14px;color:var(–t1);font-weight:500;letter-spacing:-0.01em;margin-bottom:3px;}
.me-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.me-creator{font-family:var(–mono);font-size:11px;color:var(–t2);}
.me-stars{font-size:12px;color:var(–c-event);letter-spacing:1px;}
.me-star{font-size:20px;cursor:pointer;color:var(–t4);transition:color .1s;}
.me-star.on{color:var(–c-event);}
.mv-item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid var(–b1);cursor:pointer;transition:background .1s;}
.mv-item.checked{opacity:.4;}
.mv-item.checked .mv-title{text-decoration:line-through;}
.mv-item.mv-next{background:rgba(212,175,100,.07);border-left:2px solid var(–c-event);}
.mv-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(–b2);flex-shrink:0;margin-top:2px;position:relative;cursor:pointer;}
.mv-check.checked{background:var(–c-movie);border-color:var(–c-movie);}
.mv-check.checked::after{content:’’;position:absolute;top:5px;left:4px;width:7px;height:4px;border-left:2px solid #000;border-bottom:2px solid #000;transform:rotate(-45deg);}
.mv-body{flex:1;min-width:0;}

// populateTLDropdowns removed — using collapsible tree
function isMonthComplete(yk,mk){
  // A month is "complete" if its last day is before today
  const tS=todS();
  const lastDay=new Date(parseInt(yk),parseInt(mk),0);// day 0 of next month = last of this
  return ymd(lastDay)<tS;
}
function exportMonth(yk,mk){
  const prefix=`${yk}-${mk}`;
  const evs=D.events.filter(e=>e.date.startsWith(prefix)).sort((a,b)=>a.date.localeCompare(b.date));
  if(!evs.length)return;
  const byday={};
  evs.forEach(e=>{if(!byday[e.date])byday[e.date]=[];byday[e.date].push(e);});
  const mn=MONTHS[parseInt(mk)-1];
  let txt=`## ${mn} ${yk}\n\n`;
  Object.keys(byday).sort().forEach(day=>{
    const p=parse(day);
    txt+=`### ${DAYS[p.getDay()]} ${parseInt(day.slice(8,10))}\n`;
    byday[day].forEach(e=>{
      const ck=D.checked&&D.checked[e.id]?'[x]':'[ ]';
      txt+=`${ck} ${e.title}${e.notes?' ('+e.notes+')':''}\n`;
    });
    txt+='\n';
  });
  // Download as text file
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`Chronicle-${mn}-${yk}.txt`;
  a.click();
  // Remove that month's events from D
  D.events=D.events.filter(e=>!e.date.startsWith(prefix));
  if(D.checked){Object.keys(D.checked).forEach(id=>{if(!D.events.find(e=>e.id===id))delete D.checked[id];});}
  save();renderTL();toast(`${mn} exported & removed`);
}

function renderTL(){
  const tS=todS();
  const el=document.getElementById('tlbody');

  // Build event map: all events + overdue items injected into today
  const overdue=getOverdue();
  const overdueIds=new Set(overdue.map(e=>e.id));
  // All events (original dates) — inject virtual watch events for movies with plannedDate
  const allEvs=D.events.slice();
  D.events.forEach(e=>{
    if(e.type==='movie'&&e.plannedDate&&e.plannedDate!==e.date){
      allEvs.push({...e,_watchEvent:true,date:e.plannedDate,_releaseId:e.id});
    }
  });
  // Build by year > month > day
  const tree={};
  allEvs.forEach(e=>{
    const y=e.date.slice(0,4),mk=e.date.slice(0,7),day=e.date;
    if(!tree[y])tree[y]={};
    if(!tree[y][mk])tree[y][mk]={};
    if(!tree[y][mk][day])tree[y][mk][day]=[];
    // Skip overdue items at their original date — they'll appear under today
    if(!overdueIds.has(e.id)||e.date===tS) tree[y][mk][day].push(e);
  });
  // Also add virtual watch events for movies whose plannedDate is past & unchecked
  D.events.forEach(e=>{
    if(e.type==='movie'&&e.plannedDate&&e.plannedDate<tS&&!(D.checked&&D.checked[e.id])&&e.plannedDate!==e.date){
      const virt={...e,_watchEvent:true,date:tS,_releaseId:e.id,_overdue:true};
      if(!overdueIds.has(e.id)){
        const mk2=tS.slice(0,7);
        if(!tree[tS.slice(0,4)])tree[tS.slice(0,4)]={};
        if(!tree[tS.slice(0,4)][mk2])tree[tS.slice(0,4)][mk2]={};
        if(!tree[tS.slice(0,4)][mk2][tS])tree[tS.slice(0,4)][mk2][tS]=[];
        tree[tS.slice(0,4)][mk2][tS].push(virt);
      }
    }
  });
  // Inject overdue into today
  const ty=tS.slice(0,4),tmk=tS.slice(0,7);
  if(!tree[ty])tree[ty]={};
  if(!tree[ty][tmk])tree[ty][tmk]={};
  if(!tree[ty][tmk][tS])tree[ty][tmk][tS]=[];
  const todayIds=new Set(tree[ty][tmk][tS].map(e=>e.id));
  overdue.forEach(e=>{if(!todayIds.has(e.id))tree[ty][tmk][tS].unshift({...e,_overdue:true});});

  if(!Object.keys(tree).length){el.innerHTML=`<div class="a-empty" style="padding-top:60px"><div class="ei">◌</div><p>Nothing here</p></div>`;return;}

  let h='';
  Object.keys(tree).sort().forEach(yr=>{
    const yColl=TLC.collapsed.has(yr);
    const yLabel=yr;
    h+=`<div class="tl-yr">`;
    h+=`<div class="tl-yr-lbl" onclick="tlToggle('${yr}')">${yLabel}<span class="tl-chevron">${yColl?'›':'⌄'}</span></div>`;
    if(!yColl){
      Object.keys(tree[yr]).sort().forEach(mk=>{
        const[,mnk]=mk.split('-');
        const mColl=TLC.collapsed.has(mk);
        const complete=isMonthComplete(yr,mnk);
        const mLabel=MONTHS[parseInt(mnk)-1];
        h+=`<div class="tl-mo">`;
        h+=`<div class="tl-mo-lbl" onclick="tlToggle('${mk}')">`;
        h+=`<span>${mLabel}</span>`;
        h+=`<span style="display:flex;gap:8px;align-items:center">`;
        if(complete)h+=`<button class="tl-export-btn" onclick="event.stopPropagation();exportMonth('${yr}','${mnk}')">Export & Remove</button>`;
        h+=`<span class="tl-chevron">${mColl?'›':'⌄'}</span></span>`;
        h+=`</div>`;
        if(!mColl){
          Object.keys(tree[yr][mk]).sort().forEach(day=>{
            const items=tree[yr][mk][day];
            if(!items.length)return;
            const p=parse(day),isT=day===tS;
            const dColl=TLC.collapsed.has(day);
            const allDone=items.every(e=>D.checked&&D.checked[e.id]);
            h+=`<div class="tl-day" id="tld-${day}">`;
            h+=`<div class="tl-day-lbl${isT?' today':''}" onclick="tlToggle('${day}')">`;
            h+=`<span>${isT?'Today · ':''}${DAYS[p.getDay()].toUpperCase()} ${p.getDate()}`;
            if(allDone)h+=` <span style="color:var(--c-trip);font-size:9px">✓</span>`;
            h+=`</span><span class="tl-chevron">${dColl?'›':'⌄'}</span>`;
            h+=`</div>`;
            if(!dColl){
              const sorted=[...items.filter(e=>!(D.checked&&D.checked[e.id])),...items.filter(e=>D.checked&&D.checked[e.id])];
              h+=sorted.map(e=>renderTLItem(e)).join('');
            }
            h+=`</div>`;
          });
        }
        h+=`</div>`;
      });
    }
    h+=`</div>`;
  });
  el.innerHTML=h;
}

function renderMovies(){
  const el=document.getElementById('mvbody');
  const tS=todS();
  const allMovies=D.events.filter(e=>e.type==='movie').sort((a,b)=>a.date.localeCompare(b.date));

  // Section boundaries
  const threeWeeksAgo=new Date(TODAY);threeWeeksAgo.setDate(threeWeeksAgo.getDate()-21);
  const cutoff=ymd(threeWeeksAgo);

  // In Theaters: released in last 3 weeks, not checked
  const inTheaters=allMovies.filter(e=>e.date>=cutoff&&e.date<=tS&&!(D.checked&&D.checked[e.id]));
  // Upcoming: future release date, not checked
  const isTBD=e=>!e.date || e.date==='' || e.tbd===true;
  const upcoming=allMovies.filter(e=>e.date>tS&&!(D.checked&&D.checked[e.id])&&!isTBD(e));
  const tbd=allMovies.filter(e=>!(D.checked&&D.checked[e.id])&&isTBD(e));
  // Backlog: released more than 3 weeks ago, not checked (missed the window)
  const backlog=allMovies.filter(e=>e.date<cutoff&&!(D.checked&&D.checked[e.id]));
  // Seen: checked
  const seen=allMovies.filter(e=>D.checked&&D.checked[e.id]);

  // Next 2 upcoming highlights
  const nextTwo=new Set(upcoming.slice(0,2).map(e=>e.id));

  let h='';

  // ── IN THEATERS ──
  const itColl=MVC.collapsed.has('intheaters');
  h+=`<div class="mv-sec">
    <div class="mv-sec-hd" onclick="mvToggle('intheaters')">

    </div>`;

    if(!inTheaters.length) h+=`<div class="mv-empty">Nothing currently in theaters</div>`;
    else inTheaters.forEach(e=>{h+=mvItemHTML(e,false);});

  h+=`</div>`;

  // ── UPCOMING (collapsible by year > month) ──

    <div class="mv-sec-hd" onclick="mvToggle('upcoming')">
      <span class="mv-sec-title">Upcoming</span>
      <span style="display:flex;gap:8px;align-items:center"><span class="mv-sec-count">${upcoming.length}</span><span class="tl-chevron">${upColl?'›':'⌄'}</span></span>
    </div>`;
  if(!upColl){
    if(!upcoming.length) h+=`<div class="mv-empty">No upcoming movies</div>`;
    else {
      // Group by year > month
      const byYear={};
      upcoming.forEach(e=>{
        const yr=e.date.slice(0,4),mk=e.date.slice(0,7);
        if(!byYear[yr])byYear[yr]={};
        if(!byYear[yr][mk])byYear[yr][mk]=[];
        byYear[yr][mk].push(e);
      });
      Object.keys(byYear).sort().forEach(yr=>{
        const yrKey='upy-'+yr;
        const yrColl=MVC.collapsed.has(yrKey);
        h+=`<div class="mv-yr-lbl" onclick="mvToggle('${yrKey}')">${yr}<span class="tl-chevron">${yrColl?'›':'⌄'}</span></div>`;
        if(!yrColl){
          Object.keys(byYear[yr]).sort().forEach(mk=>{
            const mnk=mk.split('-')[1];
            const mKey='upm-'+mk;
            const mColl=MVC.collapsed.has(mKey);
            h+=`<div class="mv-mo-lbl" onclick="mvToggle('${mKey}')">${MONTHS[parseInt(mnk)-1]}<span class="tl-chevron">${mColl?'›':'⌄'}</span></div>`;
            if(!mColl) byYear[yr][mk].forEach(e=>{h+=mvItemHTML(e,nextTwo.has(e.id));});
          });
        }
      });
    }
  }
  h+=`</div>`;

  // ── TBD ──
  const tbdColl=MVC.collapsed.has('tbd');
  h+=`<div class="mv-sec">
    <div class="mv-sec-hd" onclick="mvToggle('tbd')">
      <span class="mv-sec-title">TBD</span>
      <span style="display:flex;gap:8px;align-items:center"><span class="mv-sec-count">${tbd.length}</span><span class="tl-chevron">${tbdColl?'›':'⌄'}</span></span>
    </div>`;
  if(!tbdColl){
    if(!tbd.length) h+=`<div class="mv-empty">No TBD movies</div>`;
    else tbd.forEach(e=>{h+=mvItemHTML(e,false);});
  }
  h+=`</div>`;

  // ── BACKLOG ──
  const blColl=MVC.collapsed.has('backlog');
  h+=`<div class="mv-sec">
    <div class="mv-sec-hd" onclick="mvToggle('backlog')">

      <span style="display:flex;gap:8px;align-items:center"><span class="mv-sec-count">${backlog.length}</span><span class="tl-chevron">${blColl?'›':'⌄'}</span></span>
    </div>`;
  if(!blColl){
    if(!backlog.length) h+=`<div class="mv-empty">No backlog</div>`;
    else backlog.sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>{h+=mvItemHTML(e,false);});

// SERIES
function renderSeries(){
  const tS=todS();

  // Update behind flags
  D.series.forEach(s=>{
    if(s.cat!=='airing'){s.behind=false;return;}
    if(s.caughtUp){s.behind=false;return;}
    const uncheckedPast=D.events.some(e=>
      e.seriesId===s.id && e.date<tS && !(D.checked&&D.checked[e.id])
    );
    s.behind=uncheckedPast;
  });

  // ── TODAY'S WATCH ──
  // 1. Airing shows with an episode today (linked or by nextDate)
  const airingToday=D.series.filter(s=>{
    if(s.cat!=='airing') return false;
    // Has a linked event today that isn't checked
    const hasLinkedToday=D.events.some(e=>e.seriesId===s.id&&e.date===tS&&!(D.checked&&D.checked[e.id]));
    if(hasLinkedToday) return true;
    // Or nextDate is today (unlinked shows like SNL)
    return s.nextDate===tS;
  });
  // 2. Behind shows (any category)
  const behindShows=D.series.filter(s=>s.behind&&!airingToday.includes(s));
  // 3. Active shows not already captured
  const activeShows=D.series.filter(s=>s.cat==='active'&&!airingToday.includes(s)&&!behindShows.includes(s));

  const todayItems=[...airingToday,...behindShows,...activeShows];

  let html='';

  // Render Today's Watch block if anything qualifies
  if(todayItems.length){
    html+=`<div class="sr-today-block">`;
    html+=`<div class="sr-today-hd"><span class="sr-today-title">Today's Watch</span><span class="sr-today-date">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</span></div>`;
    todayItems.forEach(s=>{
      const isAiringToday=airingToday.includes(s);
      const isActive=s.cat==='active';
      // Find today's episode event if any
      const todayEv=D.events.find(e=>e.seriesId===s.id&&e.date===tS&&!(D.checked&&D.checked[e.id]));
      html+=srTodayCard(s,isAiringToday,todayEv);
    });
    html+=`</div>`;
  }

  // ── STANDARD SECTIONS ──
  const secs=[
    {k:'airing',l:'Currently Airing',h:'by next air date'},
    {k:'active',l:'Active',h:'in progress'},
    {k:'backlog',l:'Backlog',h:''},
    {k:'upcoming',l:'Upcoming',h:''},
    {k:'tbd',l:'TBD',h:'no air date yet'}
  ];
  secs.forEach(sec=>{
    let items=D.series.filter(s=>s.cat===sec.k);
    if(sec.k==='airing') items.sort((a,b)=>(a.nextDate||'9999').localeCompare(b.nextDate||'9999'));
    const open=sec.k==='airing'||sec.k==='active';
    html+=`<div class="ssblock"><div class="sshd" onclick="toggleSS(this)"><div class="sshd-l"><span class="sschev ${open?'open':''}">▶</span><span class="sshd-title">${sec.l}</span><span class="ssbadge">${items.length}</span>${sec.h?`<span class="sshint">${sec.h}</span>`:''}</div></div><div class="ssbd ${open?'open':''}">${items.length?items.map(s=>srCard(s)).join(''):'<div class="ss-empty">Nothing here</div>'}</div></div>`;
  });

  document.getElementById('srbody').innerHTML=html;
}

function srTodayCard(s, isAiringToday, todayEv){
  const tS=todS();
  let accent='var(--c-tv)';
  if(s.behind) accent='var(--c-plan)';
  else if(isAiringToday) accent='var(--c-trip)';

  let label='';
  if(isAiringToday) label='<span class="srt-pill airing">airs today</span>';
  else if(s.behind) label='<span class="srt-pill behind">behind</span>';
  else label='<span class="srt-pill active">active</span>';

  let epLine='';
  if(todayEv){
    const ck=D.checked&&D.checked[todayEv.id];
    epLine=`<div class="srt-ep" onclick="event.stopPropagation();toggleCheck('${todayEv.id}')">
      <div class="ep-check${ck?' checked':''}"></div>
      <span class="srt-ep-title">${todayEv.title}</span>
    </div>`;
  } else if(s.behind){
    // Show caught-up button prominently
    epLine=`<div class="srt-ep-hint">Unchecked episodes waiting</div>`;
  }

  const addTLBtn=s.cat==='active'?`<button class="addtlbtn" onclick="event.stopPropagation();openAddToTimeline('${s.id}')">+ timeline</button>`:'';
  const cuBtn=s.behind?`<button class="caughtbtn" onclick="event.stopPropagation();markCU('${s.id}')">✓ caught up</button>`:'';

  return `<div class="srt-card" style="border-left:2px solid ${accent}" onclick="openEditSr('${s.id}')">

function srCard(s){
  const btag=s.behind?`<span class="btag">behind</span>`:'';

  if(s.viewing)tags+=`<span class="vtag">${s.viewing}</span>`;
  if(s.platform)tags+=`<span class="stag">◈ ${s.platform}</span>`;
  if(s.season)tags+=`<span class="stag">S${s.season}</span>`;
  if((s.cat==='airing'||s.cat==='active')&&s.totalEps){
    const cur=s.curEp||1,tot=s.totalEps;
    tags+=`<span class="stag ep-counter">E${cur}<span style="color:var(--t4)">/${tot}</span></span>`;
  }
  if(s.cat==='airing'&&s.nextDate)tags+=`<span class="ntag">next ${fmtS(s.nextDate)}</span>`;
  if(s.cat==='airing'&&s.finaleDate)tags+=`<span class="stag" style="color:var(--t4)">finale ${fmtS(s.finaleDate)}</span>`;
  if(s.cat==='airing'&&s.airDays)tags+=`<span class="stag" style="color:var(--t4)">${s.airDays}</span>`;
  if(s.cat==='upcoming'&&s.prem)tags+=`<span class="ptag">premieres ${fmtS(s.prem)}</span>`;
  if(s.notes)tags+=`<span class="stag" style="font-style:italic;color:var(--t4)">${s.notes}</span>`;
  const cls='srcard'+(s.behind?' behind':(s.cat==='airing'?' airing':''));

function toggleSS(hd){hd.querySelector('.sschev').classList.toggle('open');hd.nextElementSibling.classList.toggle('open');}
function markCU(id){
  const s=D.series.find(x=>x.id===id);
  if(!s)return;
  const tS=todS();
  // Check off all linked episodes that aired on or before today
  D.events.forEach(e=>{
    if(e.seriesId===id&&e.date<=tS){
      if(!D.checked)D.checked={};
      D.checked[e.id]=true;
    }
  });
  // Count how many are now checked to set curEp
  const checkedCount=D.events.filter(e=>e.seriesId===id&&D.checked&&D.checked[e.id]).length;
  s.curEp=checkedCount+1;
  // Advance nextDate to the next unchecked future episode
  const nextUnchecked=D.events
    .filter(e=>e.seriesId===id&&!(D.checked&&D.checked[e.id])&&e.date>tS)
    .sort((a,b)=>a.date.localeCompare(b.date));
  s.nextDate=nextUnchecked.length?nextUnchecked[0].date:'';
  s.behind=false;
  s.caughtUp=true;
  save();renderTL();renderSeries();toast('Caught up ✓');
}

function saveSr(){const n=document.getElementById('srN').value.trim();if(!n){toast('Name required');return;}const cat=document.getElementById('srCat').value;if(cat==='active'&&!sid&&D.series.filter(s=>s.cat==='active').length>=3){/* capacity ok */}const rawTot=parseInt(document.getElementById('srTE').value)||0;

// MEDIA
// Item shape: {id, title, creator, cat, type, status, releaseDate, notes, rating, viewing}
// type: book | game | music | podcast | other
// status: current | backlog | completed | upcoming | tbd

const MEDIA_TYPES=[
  {k:'book',   l:'Book',    ico:'📖'},
  {k:'game',   l:'Game',    ico:'🎮'},
  {k:'music',  l:'Music',   ico:'🎵'},
  {k:'youtube',l:'YouTube', ico:'▶'},
  {k:'other',  l:'Other',   ico:'◈'},
];
const MEDIA_STATUS=[
  {k:'current',  l:'Currently Into'},
  {k:'upcoming', l:'Upcoming'},
  {k:'backlog',  l:'Backlog'},
  {k:'completed',l:'Completed'},
];

const MEC={collapsed:new Set()};
function meToggle(key){MEC.collapsed.has(key)?MEC.collapsed.delete(key):MEC.collapsed.add(key);renderMedia();}

function renderMedia(){
  const el=document.getElementById('mediabody');
  if(!D.media)D.media=[];
// Seed game entries migrated from series + timeline
(function(){const extra=[{"id": "megame0", "title": "Saros", "creator": "", "type": "game", "status": "upcoming", "releaseDate": "2026-04-30", "notes": "", "viewing": "Solo", "rating": 0}, {"id": "megame1", "title": "Wolverine", "creator": "", "type": "game", "status": "upcoming", "releaseDate": "2026-09-15", "notes": "", "viewing": "Solo", "rating": 0}, {"id": "megame2", "title": "GTA VI", "creator": "", "type": "game", "status": "upcoming", "releaseDate": "2026-11-19", "notes": "", "viewing": "Solo", "rating": 0}];extra.forEach(m=>{if(!D.media.find(x=>x.id===m.id))D.media.push(m);});})();
// Seed game entries migrated from series
(function(){const seedMedia=[{"id": "mesr0032", "title": "Control: Resonant", "creator": "", "type": "game", "status": "upcoming", "releaseDate": "", "notes": "TBD 2026", "viewing": "Solo", "rating": 0}, {"id": "mesr0035", "title": "Fable", "creator": "", "type": "game", "status": "upcoming", "releaseDate": "", "notes": "TBD", "viewing": "Solo", "rating": 0}, {"id": "mesr0037", "title": "Intergalactic: The Heretic Prophet", "creator": "", "type": "game", "status": "upcoming", "releaseDate": "", "notes": "TBD 2027", "viewing": "Solo", "rating": 0}, {"id": "mesr0033", "title": "Star Wars: Galactic Racer", "creator": "", "type": "game", "status": "upcoming", "releaseDate": "", "notes": "TBD 2026", "viewing": "Solo", "rating": 0}];seedMedia.forEach(m=>{if(!D.media.find(x=>x.id===m.id))D.media.push(m);});})();
// Migrate: podcast→youtube, tbd status→backlog
D.media.forEach(m=>{if(m.type==='podcast')m.type='youtube';if(m.status==='tbd')m.status='backlog';});
  const tS=todS();
  let h='';

  MEDIA_STATUS.forEach(sec=>{
    const items=D.media.filter(m=>m.status===sec.k);
    const coll=MEC.collapsed.has(sec.k);
    const isOpen=sec.k==='current';
    h+=`<div class="mv-sec">
      <div class="mv-sec-hd" onclick="meToggle('${sec.k}')">
        <span class="mv-sec-title">${sec.l}</span>
        <span style="display:flex;gap:8px;align-items:center">
          <span class="mv-sec-count">${items.length}</span>
          <span class="tl-chevron">${coll?'›':'⌄'}</span>
        </span>
      </div>`;
    if(!coll){
      if(!items.length){
        h+=`<div class="mv-empty">Nothing here</div>`;
      } else if(sec.k==='completed'){
        [...items].reverse().forEach(m=>{h+=meCard(m);});
      } else {
        MEDIA_TYPES.forEach(t=>{
          const typed=items.filter(m=>m.type===t.k);
          if(!typed.length) return;
          const tKey=sec.k+'-'+t.k;
          const tColl=MEC.collapsed.has(tKey);
          h+=`<div class="me-type-lbl" onclick="event.stopPropagation();meToggle('${tKey}')">
            <span>${t.ico} ${t.l}</span>
            <span style="display:flex;gap:6px;align-items:center">
              <span class="mv-sec-count" style="font-size:9px">${typed.length}</span>
              <span class="tl-chevron">${tColl?'›':'⌄'}</span>
            </span>
          </div>`;
          if(!tColl) typed.forEach(m=>{h+=meCard(m);});
        });
      }
    }
    h+=`</div>`;
  });

  el.innerHTML=h||'<div class="mv-empty" style="padding:24px">Nothing added yet</div>';
}

function meCard(m){
  const typeObj=MEDIA_TYPES.find(t=>t.k===m.type)||MEDIA_TYPES[4];
  const done=m.status==='completed';
  const stars=m.rating?'★'.repeat(m.rating)+'☆'.repeat(5-m.rating):'';
  // Linked timeline events
  const linked=D.events.filter(e=>e.mediaId===m.id);
  const nextEv=linked.filter(e=>!(D.checked&&D.checked[e.id])).sort((a,b)=>a.date.localeCompare(b.date))[0];
  const addTLBtn=`<button class="addtlbtn" onclick="event.stopPropagation();openMeAddToTL('${m.id}')">+ timeline</button>`;
  return `<div class="me-card${done?' me-done':''}" onclick="openMeSheet('${m.id}')">
    <div class="me-ico" style="color:var(--c-${m.type}||'var(--c-other)')">${typeObj.ico}</div>

      <div class="me-title">${m.title}</div>

        ${nextEv?`<span class="mv-date">next ${fmtS(nextEv.date)}</span>`:(m.releaseDate?`<span class="mv-date">${fmtS(m.releaseDate)}</span>`:(m.status==='upcoming'?`<span class="mv-date" style="color:var(--t4)">TBD</span>`:''))}
        ${m.viewing?`<span class="vtag" style="font-size:9px;padding:1px 5px">${m.viewing}</span>`:''}
        ${stars?`<span class="me-stars">${stars}</span>`:''}
        ${m.type==='book'&&m.currentPage?`<span class="me-creator">p.${m.currentPage}</span>`:''}
        ${m.type==='game'&&m.totalHours?`<span class="me-creator">${m.totalHours}h played</span>`:''}
        ${m.notes?`<span class="mv-note">${m.notes}</span>`:''}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
      ${!done?addTLBtn:''}
      <span class="iab" style="color:var(--t4);font-size:12px">›</span>
    </div>
  </div>`;
}

        <button onclick="completeSession('${evId}',false)" style="flex:1;padding:11px;border-radius:10px;border:1px solid var(--b2);background:var(--s3);color:var(--t1);font-size:13px;cursor:pointer;font-weight:500">Log</button>
        <button onclick="completeSession('${evId}',true)" style="width:100%;margin-top:4px;padding:11px;border-radius:10px;border:1px solid rgba(126,201,160,.4);background:rgba(126,201,160,.08);color:var(--c-trip);font-size:13px;cursor:pointer;font-weight:600">Finished — mark complete</button>
      </div>
    </div>`;
  modal.addEventListener('click',()=>modal.remove());

function completeSession(evId, markComplete){
  const e=D.events.find(x=>x.id===evId);
  const m=e&&e.mediaId?D.media.find(x=>x.id===e.mediaId):null;
  if(!e)return;
  const valEl=document.getElementById('sessionVal');
  const val=valEl?valEl.value.trim():'';
  const isBook=e.type==='book';
  if(val) e.sessionNote=val;
  if(m&&val){
    if(isBook){
      const pg=parseInt(val);
      if(!isNaN(pg)) m.currentPage=pg;
    } else {
      let hrs=0;
      const hm=val.match(/(\d+\.?\d*)\s*h(?:r)?(?:\s*(\d+)\s*m)?/i);
      const mo=val.match(/^(\d+\.?\d*)\s*m$/i);
      const plain=val.match(/^(\d+\.?\d*)$/);
      if(hm) hrs=parseFloat(hm[1])+(hm[2]?parseInt(hm[2])/60:0);
      else if(mo) hrs=parseInt(mo[1])/60;
      else if(plain) hrs=parseFloat(plain[1]);
      m.totalHours=Math.round(((m.totalHours||0)+hrs)*10)/10;
    }
  }
  if(markComplete&&m){
    m.status='completed';
    purgeMediaFutureEvents(m.id);
  }
  if(!D.checked)D.checked={};
  D.checked[evId]=true;
  const tS=todS();
  if(e.date<tS) e.date=tS;
  const modal=document.getElementById('sessionModal');
  if(modal)modal.remove();
  save();renderTL();renderMedia();
  if(markComplete) toast(e.title+' — complete!');
}

function saveMe(){
  const title=document.getElementById('meTitle').value.trim();
  if(!title){toast('Title required');return;}
  const newStatus=document.getElementById('meStatus').value;
  const o={
    title,
    creator:document.getElementById('meCreator').value.trim(),
    type:meType,
    status:newStatus,
    releaseDate:meType==='youtube'?'':document.getElementById('meRelease').value,
    airDays:meType==='youtube'?[...meAirDays]:[],
    notes:document.getElementById('meNotes').value.trim(),
    viewing:meV,
    rating:meRating,
  };
  const isNew=!meId;
  const existingId=meId||uid();
  if(!isNew){
    const existing=D.media.find(x=>x.id===meId);
    const oldStatus=existing.status;
    Object.assign(existing,o);
    // If YouTube days changed or status changed, regenerate
    if(meType==='youtube'){
      purgeYTEvents(existingId, newStatus==='completed');
      if(newStatus==='current') genYTEvents(existingId, title, o.airDays, o.viewing);
    }
    // If any media moved to completed, purge future unchecked linked events
    if(newStatus==='completed' && oldStatus!=='completed'){
      purgeMediaFutureEvents(existingId);
    }
    toast('Updated');
  } else {
    D.media.push({id:existingId,...o});
    if(meType==='youtube' && newStatus==='current' && o.airDays.length){
      genYTEvents(existingId, title, o.airDays, o.viewing);
    }
    toast('Added');
  }
  save();closeMeS();renderMedia();renderTL();
}

function genYTEvents(mid, title, airDays, viewing){
  if(!airDays||!airDays.length) return;
  const DAY_NUM={Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
  const dayNums=airDays.map(d=>DAY_NUM[d]).filter(d=>d!==undefined);
  const start=new Date(todS()+'T12:00:00');
  const end=new Date(start.getFullYear(),11,31,12,0,0); // Dec 31 of current year
  let cur=new Date(start);
  let count=0;
  while(cur<=end && count<300){
    if(dayNums.includes(cur.getDay())){
      D.events.push({id:uid(),title,date:ymd(cur),type:'youtube',endDate:'',notes:viewing||'',mediaId:mid});
      count++;
    }
    cur.setDate(cur.getDate()+1);
  }
}

function purgeYTEvents(mid, allFuture){
  // Remove all unchecked future youtube events for this media entry
  const tS=todS();
  D.events=D.events.filter(e=>{
    if(e.mediaId!==mid||e.type!=='youtube') return true;
    if(D.checked&&D.checked[e.id]) return true; // keep checked
    if(e.date<tS) return true; // keep past (they're history)
    return false; // remove future unchecked
  });
}

function purgeMediaFutureEvents(mid){
  const tS=todS();
  D.events=D.events.filter(e=>{
    if(e.mediaId!==mid) return true;
    if(D.checked&&D.checked[e.id]) return true;
    if(e.date<=tS) return true;
    return false;
  });
}

function completeSeries(id){

  const name=sr?sr.name:'';
  D.series=D.series.filter(s=>s.id!==id);
  save();renderSeries();toast(name+' — finished! 🎉');

function toggleCheck(id){
  if(!D.checked)D.checked={};
  const e=D.events.find(x=>x.id===id);
  if(!e)return;
  const wasChecked=!!D.checked[id];
  // Book/game: intercept first check to prompt for session details
  if(!wasChecked && e.mediaId && (e.type==='book'||e.type==='game')){
    openSessionPrompt(id);
    return;
  }
  D.checked[id]=!wasChecked;
  // If item was overdue (past date) and is now being checked, move it to today
  const tS=todS();
  if(!wasChecked && e.date<tS){
    e.date=tS;
  }

  // Sync series state based on checked episodes (single source of truth)
  if(e.seriesId){
    const sr=D.series.find(s=>s.id===e.seriesId);
    if(sr){
      const tS=todS();
      const checkedCount=D.events.filter(ev=>ev.seriesId===e.seriesId&&D.checked&&D.checked[ev.id]).length;
      const newCurEp=checkedCount+1;
      // Check if we just completed the finale
      if(!wasChecked&&sr.totalEps&&newCurEp>sr.totalEps){
        sr.curEp=sr.totalEps+1;
        promptComplete(sr);
        save();renderTL();renderSeries();return;
      }
      sr.curEp=Math.max(1,newCurEp);
      // nextDate = earliest future unchecked linked episode
      const futureUnchecked=D.events
        .filter(ev=>ev.seriesId===e.seriesId&&!(D.checked&&D.checked[ev.id])&&ev.date>=tS)
        .sort((a,b)=>a.date.localeCompare(b.date));
      sr.nextDate=futureUnchecked.length?futureUnchecked[0].date:'';
    }
  }
  save();
  renderTL();
  if(tab==='movies')renderMovies();
  if(tab==='media')renderMedia();
  renderSeries();
}
function stepEp(dir){
  const totEl=document.getElementById('srTE');
  const dispEl=document.getElementById('srEpDisplay');
  const totDisplay=document.getElementById('srEpTotal');
  const tot=parseInt(totEl.value)||0;
  let cur=parseInt(dispEl.textContent)||1;
  cur=Math.max(1,cur+dir);
  if(tot>0) cur=Math.min(cur,tot);
  dispEl.textContent=cur;
  totDisplay.textContent=tot?' / '+tot:' / —';
  // highlight if on final ep
  dispEl.style.color=tot&&cur>=tot?'var(--c-trip)':'var(--t1)';
}
